spring.application.name=tp03-bestioles

# ============================================================
# Datasource MariaDB/MySQL - base bestioles
# Executer d'abord le dump : dump-bestioles-2025-12-10.sql
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/bestioles
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# validate : ne modifie PAS la BDD, verifie seulement que les entites correspondent
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
